<style>
  :root{
    --paper:#F3ECDC; --paper-deep:#EAE1CB; --line:#CBB98C; --ink:#20293A; --ink-soft:#4B5568;
    --forest:#1B4D3E; --forest-deep:#123329; --brass:#A9803F; --brass-light:#C9A15E; --red:#A93226; --red-deep:#7E241B;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:repeating-linear-gradient(180deg, transparent, transparent 34px, rgba(203,185,140,0.35) 35px), var(--paper);color:var(--ink);font-family:'Work Sans', sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
  .urdu{font-family:'Noto Nastaliq Urdu', serif; direction:rtl; line-height:2.1;}
  h1,h2,h3,.serif{font-family:'Spectral', serif;}
  .app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:86px;}
  .masthead{background:var(--forest);background-image: radial-gradient(circle at 90% -10%, rgba(255,255,255,0.06), transparent 55%);color:#F3ECDC;padding:22px 20px 26px;border-bottom:4px double var(--brass-light);position:relative;}
  .masthead .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--brass-light);display:flex;align-items:center;gap:8px;}
  .masthead .eyebrow::before{content:"";width:16px;height:1px;background:var(--brass-light);display:inline-block;}
  .masthead h1{font-size:26px;margin:6px 0 2px;font-weight:700;}
  .masthead p{margin:0;font-size:12.5px;color:#cfe3da;opacity:.9;}
  .seal{position:absolute;top:18px;right:18px;width:52px;height:52px;border-radius:50%;border:2px solid var(--brass-light);display:flex;align-items:center;justify-content:center;font-family:'Spectral',serif;font-weight:700;color:var(--brass-light);font-size:10px;text-align:center;line-height:1.1;background:rgba(0,0,0,0.12);}
  .content{padding:18px 18px 8px;}
  .card{background:#FBF8EF;border:1px solid var(--line);border-radius:2px;box-shadow:0 1px 0 rgba(0,0,0,0.03);padding:16px;margin-bottom:14px;position:relative;}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--brass);}
  .label-tag{display:inline-block;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--forest);background:rgba(27,77,62,0.08);padding:3px 8px;border-radius:2px;font-weight:600;margin-bottom:8px;}
  .tabs{display:flex;gap:6px;margin-bottom:14px;}
  .tab{flex:1;text-align:center;padding:9px 4px;border:1px solid var(--line);border-radius:3px;font-size:12.5px;font-weight:600;color:var(--ink-soft);background:#fff;cursor:pointer;}
  .tab.active{background:var(--ink);color:#F3ECDC;border-color:var(--ink);}
  .subject-row{display:flex;align-items:center;justify-content:space-between;padding:14px 4px;border-bottom:1px dashed var(--line);cursor:pointer;}
  .subject-row:last-child{border-bottom:none;}
  .subject-row .name{font-family:'Spectral',serif;font-weight:600;font-size:16px;}
  .subject-row .meta{font-size:11px;color:var(--ink-soft);margin-top:2px;}
  .subject-row .go{color:var(--brass);font-size:20px;}
  .subject-row .best{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;}
  .best.pass{background:rgba(27,77,62,0.12);color:var(--forest);}
  .best.fail{background:rgba(169,50,38,0.12);color:var(--red);}
  .best.expert{background:rgba(169,131,63,0.18);color:var(--brass);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--forest);color:#F3ECDC;border:none;padding:14px;border-radius:3px;font-family:'Work Sans';font-weight:600;font-size:14.5px;letter-spacing:.02em;cursor:pointer;}
  .btn.outline{background:transparent;border:1.5px solid var(--forest);color:var(--forest);}
  .btn.red{background:var(--red);}
  .btn:active{transform:scale(0.98);}
  .btn:disabled{opacity:.5;}
  input[type=text], select{width:100%;padding:12px;border:1.5px solid var(--line);background:#fff;border-radius:3px;font-family:'Work Sans';font-size:14.5px;color:var(--ink);}
  label.field-label{font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;display:block;margin-bottom:6px;}
  .progress-track{height:5px;background:var(--paper-deep);border-radius:3px;overflow:hidden;margin-bottom:16px;}
  .progress-fill{height:100%;background:var(--brass);transition:width .3s;}
  .qnum{font-size:11.5px;color:var(--brass);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
  .qtext{font-family:'Spectral',serif;font-size:18px;font-weight:600;line-height:1.4;margin-bottom:18px;}
  .qtext.urdu-q{font-family:'Noto Nastaliq Urdu';direction:rtl;font-size:22px;line-height:2;}
  .opt{display:block;width:100%;text-align:left;padding:13px 14px;margin-bottom:9px;border:1.5px solid var(--line);background:#fff;border-radius:4px;font-size:14.5px;color:var(--ink);cursor:pointer;font-family:'Work Sans';}
  .opt.rtl-opt{text-align:right;font-family:'Noto Nastaliq Urdu';direction:rtl;font-size:17px;}
  .opt.correct{border-color:var(--forest);background:rgba(27,77,62,0.14);}
  .opt.wrong{border-color:var(--red);background:rgba(169,50,38,0.1);}
  .opt.disabled{pointer-events:none;}
  .stamp-wrap{display:flex;justify-content:center;margin:22px 0 10px;}
  .stamp{width:168px;height:168px;border-radius:50%;border:5px double;display:flex;flex-direction:column;align-items:center;justify-content:center;transform:rotate(-9deg);font-family:'Spectral',serif;}
  .stamp.pass{border-color:var(--forest);color:var(--forest);}
  .stamp.fail{border-color:var(--red);color:var(--red);}
  .stamp .big{font-size:26px;font-weight:700;letter-spacing:.05em;}
  .stamp .pct{font-size:34px;font-weight:700;margin:2px 0;}
  .stamp .small{font-size:10px;letter-spacing:.12em;text-transform:uppercase;}
  .bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--ink);display:flex;border-top:3px double var(--brass);}
  .navbtn{flex:1;text-align:center;padding:11px 4px 9px;color:#8a93a6;cursor:pointer;font-size:10.5px;font-weight:600;}
  .navbtn .ic{font-size:19px;display:block;margin-bottom:2px;}
  .navbtn.active{color:#F3ECDC;}
  .divider-label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);text-align:center;margin:20px 0 10px;position:relative;}
  .divider-label::before,.divider-label::after{content:"";position:absolute;top:50%;width:30%;height:1px;background:var(--line);}
  .divider-label::before{left:0;} .divider-label::after{right:0;}
  .history-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line);font-size:13px;}
  .history-row:last-child{border-bottom:none;}
  .history-row .dot{width:8px;height:8px;border-radius:50%;margin-right:8px;display:inline-block;}
  .lead-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13.5px;align-items:center;}
  .rank{width:22px;height:22px;border-radius:50%;background:var(--forest);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Spectral';}
  .chap-row{display:flex;align-items:center;justify-content:space-between;padding:13px 4px;border-bottom:1px dashed var(--line);}
  .chap-row:last-child{border-bottom:none;}
  .chap-row.locked{opacity:.45;}
  .chap-badge{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;font-family:'Spectral';}
  .chap-badge.done{background:var(--forest);color:#fff;}
  .chap-badge.open{background:var(--brass-light);color:#3a2b00;}
  .chap-badge.lock{background:var(--paper-deep);color:var(--ink-soft);}
  .expert-strip{background:linear-gradient(90deg,var(--brass),var(--brass-light));color:#3a2b00;text-align:center;padding:8px;border-radius:3px;font-size:12px;font-weight:700;margin-top:10px;}
  a{color:var(--forest);}
  .hidden{display:none !important;}
  .center{text-align:center;}
  .muted{color:var(--ink-soft);font-size:12.5px;}
  .mb8{margin-bottom:8px;} .mb14{margin-bottom:14px;} .mb18{margin-bottom:18px;}
</style>

const PASS_PCT = 50;
const CHUNK = 3; // questions per chapter

function chunkArr(arr,size){ const out=[]; for(let i=0;i<arr.length;i+=size) out.push(arr.slice(i,i+size)); return out; }

/* Build BANK with chapters derived from RAW qs (scalable: add more qs to RAW anytime and chapters grow automatically) */
const BANK = JSON.parse(JSON.stringify(RAW));
Object.values(BANK).forEach(level=>{
  Object.values(level.subjects).forEach(subj=>{
    if(subj.chapters && subj.chapters.length){
      subj.qs = subj.chapters.flatMap(c=>c.qs);
    } else {
      subj.chapters = chunkArr(subj.qs, CHUNK).map((qs,i)=>({ title:`Chapter ${i+1}`, qs }));
    }
  });
});

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function uid(){ return 's'+Math.random().toString(36).slice(2,10)+Date.now().toString(36); }

let DEVICE_ID = null;
async function ensureDeviceId(){
  try{ const res = await window.storage.get('device-id', false); DEVICE_ID = res.value; }
  catch(e){ DEVICE_ID = uid(); try{ await window.storage.set('device-id', DEVICE_ID, false); }catch(e2){} }
}
async function loadProfile(){ try{ const res = await window.storage.get('profile', false); state.profile = JSON.parse(res.value); }catch(e){ state.profile = null; } }
async function saveProfile(p){ state.profile = p; try{ await window.storage.set('profile', JSON.stringify(p), false); }catch(e){} }
async function loadHistory(){ try{ const res = await window.storage.get('history', false); state.history = JSON.parse(res.value); }catch(e){ state.history = []; } }
async function loadProgress(){ try{ const res = await window.storage.get('chapter-progress', false); state.progress = JSON.parse(res.value); }catch(e){ state.progress = {}; } }
async function saveProgress(){ try{ await window.storage.set('chapter-progress', JSON.stringify(state.progress), false); }catch(e){} }

async function saveAttempt(attempt){
  state.history.unshift(attempt);
  try{ await window.storage.set('history', JSON.stringify(state.history), false); }catch(e){}
  try{
    const key = 'lb-'+attempt.level+'-'+attempt.subjectKey;
    let list = [];
    try{ const res = await window.storage.get(key, true); list = JSON.parse(res.value); }catch(e){}
    list.push({name:attempt.name, cls:attempt.cls, pct:attempt.pct, date:attempt.date});
    list.sort((a,b)=>b.pct-a.pct);
    list = list.slice(0,30);
    await window.storage.set(key, JSON.stringify(list), true);
  }catch(e){}
}

function progKey(level,subj,idx){ return level+'-'+subj+'-'+idx; }
function chapterUnlocked(level,subj,idx){
  if(idx===0) return true;
  const prev = state.progress[progKey(level,subj,idx-1)];
  return !!(prev && prev.pct>=PASS_PCT);
}
function subjectStatus(level,subjKey){
  const subj = BANK[level].subjects[subjKey];
  const total = subj.chapters.length;
  let passedCount=0;
  subj.chapters.forEach((c,i)=>{ const p = state.progress[progKey(level,subjKey,i)]; if(p && p.pct>=PASS_PCT) passedCount++; });
  return {passedCount, total, expert: passedCount===total};
}

}

function renderChapters(subjectKey){
  state.subjectKey = subjectKey;
  const subj = BANK[state.level].subjects[subjectKey];
  const st = subjectStatus(state.level,subjectKey);
  el.innerHTML = `${masthead(subj.label+' — chapter progression')}
    <div class="content">
      <div class="card">
        <div class="label-tag">${subj.icon} ${subj.label} — pass each chapter to unlock the next</div>
        ${subj.chapters.map((c,i)=>{
          const p = state.progress[progKey(state.level,subjectKey,i)];
          const unlocked = chapterUnlocked(state.level,subjectKey,i);
          const passed = p && p.pct>=PASS_PCT;
          const badgeClass = passed?'done':(unlocked?'open':'lock');
          const badgeText = passed?'✓':(unlocked?(i+1):'🔒');
          return `<div class="chap-row ${unlocked?'':'locked'}" data-chap="${unlocked?i:''}">
            <div style="display:flex;align-items:center;gap:12px;">
              <div class="chap-badge ${badgeClass}">${badgeText}</div>
              <div><div style="font-weight:600;font-size:14px;">${c.title}</div><div class="meta" style="font-size:11px;color:var(--ink-soft);">${c.qs.length} questions${p?` · Last score ${p.pct}%`:''}</div></div>
            </div>
            <span class="go">${unlocked?'›':''}</span>
          </div>`;
        }).join('')}
        ${st.expert?`<div class="expert-strip">🏅 Congratulations — you are now an Expert in ${subj.label}!</div>`:''}
      </div>
      <button class="btn outline" id="btnBack">← Back to subjects</button>
    </div>${bottomNav('home')}`;
  el.querySelectorAll('[data-chap]').forEach(r=>{
    if(r.dataset.chap!=='') r.onclick=()=>startQuiz(subjectKey, +r.dataset.chap);
  });
  document.getElementById('btnBack').onclick=()=>renderHome();
  wireNav();
}

function startQuiz(subjectKey, chapterIdx){
  const subj = BANK[state.level].subjects[subjectKey];
  const chap = subj.chapters[chapterIdx];
  const items = shuffle(chap.qs).map(([q,opts,ans])=>{
    const correctText = opts[ans];
    const shuffledOpts = shuffle(opts);
    const newAns = shuffledOpts.indexOf(correctText);
    return {q, opts:shuffledOpts, ans:newAns};
  });
  state.subjectKey = subjectKey;
  state.chapterIdx = chapterIdx;
  state.quiz = {items, idx:0, correctCount:0, selected:null, locked:false, urdu: !!subj.urduSubject, label:subj.label, chapTitle:chap.title};
  goto('quiz');
}

function renderQuiz(){
  const qz = state.quiz;
  const item = qz.items[qz.idx];
  const pct = Math.round((qz.idx)/qz.items.length*100);
  el.innerHTML = `${masthead(qz.label+' — '+qz.chapTitle)}
    <div class="content">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;"></div></div>
      <div class="qnum">Question ${qz.idx+1} of ${qz.items.length}</div>
      <div class="qtext ${qz.urdu?'urdu-q':''}">${item.q}</div>
      <div id="optsWrap">${item.opts.map((o,i)=>`<button class="opt ${qz.urdu?'rtl-opt':''}" data-i="${i}">${o}</button>`).join('')}</div>
      <button class="btn hidden" id="btnNext" style="margin-top:10px;">${qz.idx===qz.items.length-1?'See my result':'Next question'}</button>
    </div>`;
  el.querySelectorAll('.opt').forEach(b=>{
    b.onclick = ()=>{
      if(qz.locked) return;
      qz.locked = true;
      const i = +b.dataset.i;
      qz.selected = i;
      if(i===item.ans) qz.correctCount++;
      el.querySelectorAll('.opt').forEach((ob,oi)=>{
        ob.classList.add('disabled');
        if(oi===item.ans) ob.classList.add('correct');
        else if(oi===i) ob.classList.add('wrong');
      });
      document.getElementById('btnNext').classList.remove('hidden');
    };
  });
  document.getElementById('btnNext').onclick = ()=>{
    if(qz.idx < qz.items.length-1){ qz.idx++; qz.selected=null; qz.locked=false; renderQuiz(); }
    else finishQuiz();
  };
}

async function finishQuiz(){
  const qz = state.quiz;
  const pct = Math.round(qz.correctCount/qz.items.length*100);
  const attempt = { level: state.level, subjectKey: state.subjectKey, subjectLabel: qz.label, chapterIdx: state.chapterIdx,
    chapTitle: qz.chapTitle, correct: qz.correctCount, total: qz.items.length, pct,
    name: state.profile.name, cls: state.profile.cls, date: new Date().toISOString().slice(0,10) };
  await saveAttempt(attempt);
  state.progress[progKey(state.level,state.subjectKey,state.chapterIdx)] = {pct, passed: pct>=PASS_PCT};
  await saveProgress();
  state.lastAttempt = attempt;
  goto('result');
}

function renderResult(){
  const a = state.lastAttempt;
  const passed = a.pct >= PASS_PCT;
  const subj = BANK[a.level].subjects[a.subjectKey];
  const hasNext = a.chapterIdx < subj.chapters.length-1;
  el.innerHTML = `${masthead(a.chapTitle+' — Result Slip')}
    <div class="content">
      <div class="card center" style="padding:20px 16px;">
        <div class="muted">${a.subjectLabel} · ${BANK[a.level].label}</div>
        <div class="stamp-wrap"><div class="stamp ${passed?'pass':'fail'}"><div class="big">${passed?'PASS':'RETRY'}</div><div class="pct">${a.pct}%</div><div class="small">${a.correct} / ${a.total} correct</div></div></div>
        <p style="font-size:13px;margin-top:4px;">${passed? (hasNext? 'Shabash '+a.name+'! Agla chapter khul gaya hai.' : 'Shabash '+a.name+'! Aap ne is subject ke sab chapters pass kar liye — Expert ban gaye!') : 'Koi baat nahi, '+a.name+'. Isi chapter ko dobara try karein, agla chapter tab khulega jab yeh pass ho jaye.'}</p>
      </div>
      ${passed && hasNext ? `<button class="btn" id="btnNextChap">Next Chapter →</button>` : ''}
      <button class="btn ${passed && hasNext?'outline':''}" id="btnRetry" style="margin-top:10px;">Try again (new random questions)</button>
      <button class="btn outline" id="btnChapters" style="margin-top:10px;">Back to chapters</button>
    </div>${bottomNav('home')}`;
  if(document.getElementById('btnNextChap')) document.getElementById('btnNextChap').onclick = ()=>startQuiz(a.subjectKey, a.chapterIdx+1);
  document.getElementById('btnRetry').onclick = ()=>startQuiz(a.subjectKey, a.chapterIdx);
  document.getElementById('btnChapters').onclick = ()=>renderChapters(a.subjectKey);
  wireNav();
}

function renderHistory(){
  const rows = state.history;
  el.innerHTML = `${masthead('My Marks Register')}
    <div class="content">
      <div class="card">
        <div class="label-tag">Attempt history</div>

      </div>
    </div>${bottomNav('history')}`;

}

async function fetchLeaderboard(level, subjectKey){
  const key = 'lb-'+level+'-'+subjectKey;
  try{ const res = await window.storage.get(key, true); return JSON.parse(res.value); }catch(e){ return []; }
}
async function renderLeaderboard(){
  el.innerHTML = `${masthead('Class Leaderboard')}<div class="content"><div class="card center"><p class="muted">Loading…</p></div></div>${bottomNav('leaderboard')}`;
  wireNav();
  const lv = BANK[state.level];
  const subs = Object.keys(lv.subjects);
  const firstSub = state.subjectKey && lv.subjects[state.subjectKey] ? state.subjectKey : subs[0];
  const list = await fetchLeaderboard(state.level, firstSub);
  el.innerHTML = `${masthead('Class Leaderboard')}
    <div class="content">
      <div class="tabs">${Object.entries(BANK).map(([k,v])=>`<div class="tab ${state.level===k?'active':''}" data-level2="${k}">${v.label}</div>`).join('')}</div>
      <div class="card"><div class="label-tag">Subject</div><select id="lbSubject">${subs.map(s=>`<option value="${s}" ${s===firstSub?'selected':''}>${lv.subjects[s].label}</option>`).join('')}</select></div>
      <div class="card"><div class="label-tag">Top scorers — visible to all students &amp; teachers</div><div id="lbList">
      ${list.length? list.map((r,i)=>`<div class="lead-row"><span style="display:flex;align-items:center;gap:8px;"><span class="rank">${i+1}</span>${r.name} <span class="muted">(Class ${r.cls})</span></span><b>${r.pct}%</b></div>`).join('') : `<p class="muted">Is subject mein abhi tak koi result submit nahi hua.</p>`}
      </div></div>
      <p class="muted center">Names &amp; scores shown here are shared with everyone using this app.</p>
    </div>${bottomNav('leaderboard')}`;
  el.querySelectorAll('[data-level2]').forEach(t=>t.onclick=()=>{state.level=t.dataset.level2; state.subjectKey=null; renderLeaderboard();});
  document.getElementById('lbSubject').onchange = async (e)=>{
    state.subjectKey = e.target.value;
    const l2 = await fetchLeaderboard(state.level, state.subjectKey);
    document.getElementById('lbList').innerHTML = l2.length? l2.map((r,i)=>`<div class="lead-row"><span style="display:flex;align-items:center;gap:8px;"><span class="rank">${i+1}</span>${r.name} <span class="muted">(Class ${r.cls})</span></span><b>${r.pct}%</b></div>`).join('') : `<p class="muted">Is subject mein abhi tak koi result submit nahi hua.</p>`;
  };
  wireNav();
}

function wireNav(){
  el.querySelectorAll('[data-nav]').forEach(b=>{ b.onclick = ()=>goto(b.dataset.nav); });
}

async function goto(screen){
  state.screen = screen;
  if(screen==='home') renderHome();
  else if(screen==='quiz') renderQuiz();
  else if(screen==='result') renderResult();
  else if(screen==='history') renderHistory();
  else if(screen==='leaderboard') await renderLeaderboard();
  else if(screen==='resources') renderResources();
}

async function boot(){
  el.innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;"><div class="center"><div class="serif" style="font-size:20px;font-weight:700;color:#1B4D3E;">Taleem Ghar</div><div class="muted">Loading your register…</div></div></div>`;
  await ensureDeviceId();
  await loadProfile();
  await loadHistory();
  await loadProgress();
  if(state.profile){ state.level = state.profile.level; goto('home'); }
  else renderOnboarding();
  if('serviceWorker' in navigator){ window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }
}
boot();
